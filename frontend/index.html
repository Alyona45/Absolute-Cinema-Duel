<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MovieCO</title>
  <style>
    :root {
      --bg1: #f5efe6;
      --bg2: #f2d9bf;
      --ink: #202020;
      --accent: #d35400;
      --accent-2: #176b87;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #ffffff;
      color: var(--ink);
      font-family: "Avenir Next", "Futura", sans-serif;
    }
    main {
      width: min(760px, 92vw);
      text-align: center;
      animation: appear 500ms ease;
    }
    h1 {
      font-size: clamp(2rem, 5vw, 3.2rem);
      letter-spacing: 0.04em;
      margin-bottom: 2rem;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 1rem;
    }
    .btn {
      border: 0;
      border-radius: 16px;
      padding: 1.4rem;
      font-size: 1.4rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 180ms ease, box-shadow 180ms ease;
      box-shadow: 0 8px 24px rgba(0,0,0,.16);
    }
    .btn:hover { transform: translateY(-3px) scale(1.01); }
    .flappyfilm { background: #176b87; color: #fff; }
    .movieco { background: #d35400; color: #fff; }
    .note {
      margin-top: 1rem;
      color: #555;
      font-size: .95rem;
    }
    @keyframes appear {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <main>
    <h1>Cinema Duel</h1>
    <div class="grid">
      <button class="btn flappyfilm" onclick="location.href='/static/flappy.html'">FlappyFilms</button>
      <button class="btn movieco" onclick="location.href='/static/movieco/tournament.html'">MovieCO</button>
    </div>
  </main>
</body>
</html>
